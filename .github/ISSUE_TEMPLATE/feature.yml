name: "✨ Feature"
description: 새로운 기능을 위한 템플릿입니다.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: "📝 상세 내용"
      description: "이슈에 대해서 간략히 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: "✅ TODO"
      description: "해당 이슈에 대해 필요한 작업목록을 작성해주세요"
      value: |
        - [ ] Task1
        - [ ] Task2
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "🔎 참고 사항"
      placeholder: "참고할 자료나 스크린샷 등을 입력해주세요"
